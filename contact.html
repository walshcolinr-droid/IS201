            .contact-card {

                margin-top: 2rem;

            .profile-photo {
                width: 220px;
                height: 220px;
                object-fit: cover;
                border-radius: 50%;
                border: 4px solid #dee2e6;
                display: block;
                margin: 0 auto 1.5rem auto;
            }

            .contact-info-item {
                font-size: 1.1rem;
                margin-bottom: 1rem;
            }

            .contact-info-item i {
                width: 30px;
                color: #6c757d;
                margin-right: 10px;
            }

            .contact-heading {
                text-align: center;
                margin-bottom: 2rem;
            }

            @media (max-width: 768px) {
                .profile-photo {
                    width: 180px;
                    height: 180px;
                }

                .contact-card {
                    padding: 1.5rem;
                }
